onnx_path: "pcvis_lite_teacher707000_model79000_globalref.onnx"
# reference_source:
#   embedded_npz  : route A, ONNX 内嵌多 NPZ reference，用 motion_id/local_step 播放
#   realtime_gmr  : route B, 从 RobotData realtime reference cache 读取在线 reference
reference_source: embedded_npz
# legacy alias; keep false unless reference_source is realtime_gmr.
use_realtime_gmr: false
gmr_reference:
  max_age_s: 0.25
warm_start_time: 0.0
# Multi-motion ONNX exported by BeyondMimic stores all NPZ frames as one global
# timeline. Pick one motion here; fsm_stairs.py reads offsets/lengths from ONNX
# metadata and sends global_time_step = motion_offset + local_step.
motion_id: 6
# motion_name can be used instead of motion_id after exporting metadata.
# 原速 0.6m: motion_id 6/7/8; spd110: 15/16/17; spd090: 24/25/26.
# motion_name: "climb0630/Box_3_take001_Skeleton0"

